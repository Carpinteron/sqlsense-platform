services:
  redis:
    image: redis:alpine
    container_name: sql_sense_redis
    networks:
      - sql_sense_network
  
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: supersecret_dev
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sql_sense_network
      
  backend:
    build: ./api
    container_name: sql_sense_backend
    ports:
      - "3001:3000"
    env_file:
      - ./api/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_REFRESH_TTL=604800

      - DATABASE_URL=postgresql://appuser:supersecret_dev@postgres/appdb

      - JWT_SECRET=9e2d9502a1e30e2c4ddb8dcc3f9a9018
      - JWT_ACCESS_EXPIRATION=1h
      - JWT_REFRESH_EXPIRATION=7d

      - AI_ENDPOINT=https://chat.homelab.builders/v1/chat/completions
      - AI_MODEL=google/gemma-4-e4b
      - AI_TEMPERATURE=0
      - AI_MAX_TOKENS=65536
      - AI_TIMEOUT=60000
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - sql_sense_network

  worker:
    build: ./worker
    container_name: sql_sense_worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_REFRESH_TTL=604800
    depends_on:
      - postgres
      - redis
    networks:
      - sql_sense_network

volumes:
  database_data:

networks:
  sql_sense_network:
    driver: bridge